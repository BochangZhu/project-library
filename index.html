<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="script.js" defer></script>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&family=Sansita:ital,wght@0,400;0,700;0,800;0,900;1,400;1,700;1,800;1,900&display=swap" rel="stylesheet">
</head>
<body>
    <h1>Welcome to Virtual Book Library!</h1>
    <div class="grid-container">

        <template>
            <div class="book-card">

                <p class="title">Title</p>
                <p class="name"></p>
                <p class="title">Author</p>
                <p class="author"></p>
                <p class="title">Pages</p>
                <p class="pages"></p>
                <p class="title">Added Time</p>
                <p class="time"></p>           

                <div class="control">
                    <label class="toggle">
                        <input type="checkbox" id="checkbox" name="checkbox">
                        <span class="slider"></span>
                    </label>
                    <button class="remove">❌</button>
                </div>
            </div>
        </template>

    </div>
    <div class="function">
        <button class="append">Add a New Book</button>
        <dialog>
            <form action="#" method="dialog">
                <div>
                    <label for="title">Please enter the book title:</label>
                    <input type="text" id="title" name="title" required>
                </div>
                <div>
                    <label for="author">Please enter the author name:</label>
                    <input type="text" id="author" name="author" required>
                </div>
                <div>
                    <label for="page">Please enter the pages: </label>
                    <input type="number" id="page" name="page" min="1" max="999999" required>
                </div>
                <div>
                    <label for="read">Did you finish reading it?</label>
                    <input type="checkbox" id="read" name="read">
                </div>
                <div class="btns">
                    <button type="submit" value="submit">Submit</button>
                    <button type="submit" value="" formnovalidate>Cancel</button>
                </div>
            </form>
        </dialog>
    </div>
   
</body>
</html>
